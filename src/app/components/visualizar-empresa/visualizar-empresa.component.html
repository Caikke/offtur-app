<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Detalhes da Empresa</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="fechar()" color="medium">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="view-header">
    <div class="logo-box">
      <img [src]="empresa.logoUrl || 'assets/icon/favicon.png'" />
    </div>
    <h1>{{ empresa.nome }}</h1>
    <ion-badge color="primary" mode="ios">Empresa Parceira</ion-badge>
  </div>

  <ion-list lines="none" class="info-list">
    <ion-item class="info-item">
      <ion-icon name="business-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <p>CNPJ</p>
        <h3>{{ empresa.cnpj }}</h3>
      </ion-label>
    </ion-item>

    <ion-item class="info-item">
      <ion-icon name="mail-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <p>E-mail de Contato</p>
        <h3>{{ empresa.email }}</h3>
      </ion-label>
    </ion-item>

    <div class="divider"></div>

    <ion-list-header>
      <ion-label>Contatos Cadastrados</ion-label>
    </ion-list-header>

    @for (tel of empresa.telefones; track $index) {
      <ion-item class="contact-item">
        <div class="contact-icon" slot="start">
          <ion-icon name="call-outline"></ion-icon>
        </div>
        <ion-label>
          <h3>{{ tel.numero }}</h3>
          <p>{{ tel.rotulo }}</p>
        </ion-label>
        <ion-button fill="clear" slot="end" color="medium">
          <ion-icon name="copy-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-item>
    }
  </ion-list>

  <div class="action-footer">
    <ion-button expand="block" (click)="irParaEditar()" class="edit-btn">
      <ion-icon name="create-outline" slot="start"></ion-icon>
      Editar Informações
    </ion-button>
  </div>
</ion-content>
