<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Empresas</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="abrirCadastro()">
        <ion-icon name="add-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list lines="none">
    @for (empresa of empresas$ | async; track empresa.id) {
      
      <ion-item-sliding class="ion-margin-bottom">
        
        <ion-item class="custom-card" (click)="editarEmpresa(empresa)" button="true" detail="false">
          <ion-thumbnail slot="start">
            <img [src]="empresa.logoUrl || 'assets/icon/favicon.png'" [alt]="empresa.nome" />
          </ion-thumbnail>
          
          <ion-label>
            <div class="header-item">
              <h2>{{ empresa.nome }}</h2>
              <ion-badge color="success" mode="ios">Ativa</ion-badge>
            </div>
            
            <p>CNPJ: {{ empresa.cnpj }}</p>
            
            @if (empresa.telefones && empresa.telefones.length > 0) {
              <p class="phone-tag">
                <ion-icon name="call-outline"></ion-icon>
                {{ empresa.telefones[0].numero }}
              </p>
            }
          </ion-label>

          <ion-icon name="chevron-forward-outline" slot="end" color="medium" style="font-size: 16px;"></ion-icon>
        </ion-item>

        <ion-item-options side="end">
          <ion-item-option color="danger" (click)="desativarEmpresa(empresa)">
            <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
            <ion-label>Desativar</ion-label>
          </ion-item-option>
        </ion-item-options>

      </ion-item-sliding>

    } @empty {
      <div class="ion-text-center ion-padding" style="margin-top: 50px;">
        <ion-icon name="bus-outline" style="font-size: 64px; color: #ccc;"></ion-icon>
        <p style="color: #999;">Nenhuma empresa cadastrada ainda.</p>
      </div>
    }
  </ion-list>
</ion-content>
